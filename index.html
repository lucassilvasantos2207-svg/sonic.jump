<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic Jump</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
        }

        /* TELA */

        .game-board {
            width: 100%;
            height: 500px;
            position: relative;
            overflow: hidden;

            background: #4ecbff;
        }

        /* NUVENS */

        .nuvem {
            position: absolute;
            width: 220px;
            top: 40px;
            right: -300px;

            animation: nuvem-animation 20s infinite linear;
        }

        .nuvem2 {
            position: absolute;
            width: 180px;
            top: 120px;
            right: -300px;

            animation: nuvem-animation 30s infinite linear;
        }

        /* PALMEIRAS */

        .palmeira {
            position: absolute;
            bottom: 90px;
            right: 250px;
            width: 140px;

            z-index: 1;
        }

        .palmeira2 {
            position: absolute;
            bottom: 90px;
            right: 700px;
            width: 170px;

            z-index: 1;
        }

        /* GRAMA */

        .grama {
            position: absolute;
            bottom: 90px;
            width: 100%;
            height: 15px;

            background: #5cff00;

            border-top: 5px solid #a8ff60;

            z-index: 2;
        }

        /* CHÃO */

        .chao {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 90px;

            background-color: #a14f00;

            background-image:
            linear-gradient(45deg, #6b2f00 25%, transparent 25%),
            linear-gradient(-45deg, #6b2f00 25%, transparent 25%),
            linear-gradient(45deg, transparent 75%, #c96a16 75%),
            linear-gradient(-45deg, transparent 75%, #c96a16 75%);

            background-size: 40px 40px;

            z-index: 0;
        }

        /* SONIC */

        .sonic {
            position: absolute;
            bottom: 78px;
            left: 50px;
            width: 110px;

            z-index: 3;
        }

        /* ESPINHO */

        .espinho {
            position: absolute;
            bottom: 78px;
            width: 70px;
            right: -80px;

            animation: espinho-animation 2s infinite linear;

            z-index: 3;
        }

        /* PULO */

        .jump {
            animation: jump 500ms ease-in-out;
        }

        /* ANIMAÇÕES */

        @keyframes espinho-animation {

            from {
                right: -80px;
            }

            to {
                right: 100%;
            }
        }

        @keyframes nuvem-animation {

            from {
                right: -300px;
            }

            to {
                right: 100%;
            }
        }

        @keyframes jump {

            0% {
                bottom: 78px;
            }

            40% {
                bottom: 230px;
            }

            50% {
                bottom: 230px;
            }

            60% {
                bottom: 230px;
            }

            100% {
                bottom: 78px;
            }
        }

    </style>

</head>

<body>

    <div class="game-board">

        <!-- NUVENS -->
        <img src="./imagem/nuvem.png" class="nuvem">
        <img src="./imagem/nuvem.png" class="nuvem2">

        <!-- PALMEIRAS -->
        <img src="./imagem/palmeira.png" class="palmeira">
        <img src="./imagem/palmeira.png" class="palmeira2">

        <!-- GRAMA -->
        <div class="grama"></div>

        <!-- CHÃO -->
        <div class="chao"></div>

        <!-- SONIC -->
        <img src="./imagem/sonic correndo.gif" class="sonic">

        <!-- ESPINHO -->
        <img src="./imagem/espinho.webp" class="espinho">

    </div>

    <script>

        const sonic = document.querySelector('.sonic');
        const espinho = document.querySelector('.espinho');

        const jump = () => {

            sonic.classList.add('jump');

            setTimeout(() => {

                sonic.classList.remove('jump');

            }, 500);
        };

        const loop = setInterval(() => {

            const espinhoPosition = espinho.offsetLeft;

            const sonicPosition = +window
                .getComputedStyle(sonic)
                .bottom.replace('px', '');

            if (
                espinhoPosition <= 120 &&
                espinhoPosition > 0 &&
                sonicPosition < 150
            ) {

                espinho.style.animation = 'none';
                espinho.style.left = `${espinhoPosition}px`;

                sonic.style.animation = 'none';
                sonic.style.bottom = `${sonicPosition}px`;

                sonic.src = './imagem/sonic morrendo.webp';
                sonic.style.width = '90px';
                sonic.style.marginLeft = '50px';

                clearInterval(loop);
            }

        }, 10);

        document.addEventListener('keydown', jump);

    </script>

</body>

</html>
